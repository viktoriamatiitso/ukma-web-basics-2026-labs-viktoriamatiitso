<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>BuyList</title>
    <link rel="stylesheet" href="./main.css">
</head>
<body>
    <h1>Кошик товарів🛒</h1>
    <main class="container">    
        <section class="left-column">
            <div class="add-item-section">
                <input class="name-item" type="text" placeholder="Назва товару" aria-label="Назва товару">
                <button class="add-item" aria-label="Додати товар" data-tooltip="Додати товар у список">Додати</button>
            </div>
            <div class="items-list">
                <div class="item-row">
                    <span class="item-bought-name">Помідори</span>
                    <div class="buttons">
                            <span class="item-amount-1">2</span>
                            <button class="not-bought"aria-label="Не куплено" data-tooltip="Відмітити як куплене">Не куплено</button>
                    </div>
                </div>
                <div class="item-row">
                    <span class="item-name">Печиво</span>
                    <div class="buttons">
                        <button class="btn-minus" aria-label="Зменшити кількість" data-tooltip="Зменшити кількість">-</button>
                        <span class="item-amount">2</span>
                        <button class="btn-plus" aria-label="Збільшити кількість" data-tooltip="Збільшити кількість">+</button>
                        <button class="bought" aria-label="Куплено" data-tooltip="Повернути в список">Куплено</button>
                        <button class="remove-item" aria-label="Видалити товар" data-tooltip="Видалити товар">x</button>
                    </div>
                </div>
                <div class="item-row">
                    <input type="text" class="edit-item" value="Сир" aria-label="Редагувати назву товару">
                    <div class="buttons">
                        <button class="btn-minus-dis" aria-label="Зменшити кількість" data-tooltip="Зменшити кількість">-</button>
                        <span class="item-amount">1</span>
                        <button class="btn-plus" aria-label="Збільшити кількість" data-tooltip="Збільшити кількість">+</button>
                        <button class="bought" aria-label="Куплено" data-tooltip="Повернути в список">Куплено</button>
                        <button class="remove-item" aria-label="Видалити товар" data-tooltip="Видалити товар">x</button>
                    </div>
                </div>
            </div>
        </section>
        <aside class="right-column">
            <h2>Залишилось</h2>
            <div class="leftovers">
                <div class="leftover">
                    <span>Печиво</span>
                    <span class="leftovers-amount">2</span>
                </div>
                <div class="leftover">
                    <span >Сир</span>
                    <span class="leftovers-amount">1</span>
                </div>
            </div>
            <h2>Куплено</h2>
            <div class="bought-items-container">
                <div class="bought-item-card">
                    <span class="bought-items">Помідори</span>
                    <span class="bought-items-amount">2</span>
                </div>
            </div>
        </aside>
    </main>

    <div class="author-badge">
        <div class="badge-front">BuyList</div>
        <div class="badge-hidden">Виконала: Матійцьо Вікторія</div>
    </div>
</body>
</html>
